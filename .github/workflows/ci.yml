name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Build eslint-plugin
        run: pnpm --filter @zeltjs/eslint-plugin build

      - name: Build hono-client (for type resolution)
        run: pnpm --filter @zeltjs/hono-client build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Verify dist imports
        run: pnpm verify-dist

      - name: leak check on public d.ts
        run: |
          set -e
          PUBLIC_DTS="packages/core/dist/index.d.ts"
          [ -f "$PUBLIC_DTS" ] || { echo "missing $PUBLIC_DTS"; exit 1; }

          HONO_REFS=$(grep -E "from ['\"]hono(/|['\"])" "$PUBLIC_DTS" || true)
          # Whitelisted lines (intentional public surface):
          #   HTTPException — explicit re-export per §4.1 (Phase 2 (2))
          #   TypedResponse — structural part of ResponseBuilder return types
          #   ContentfulStatusCode — structural part of ResponseBuilder status parameter types
          #   Context, Env, Input, MiddlewareHandler — middleware types for KoyaContext/FunctionMiddleware
          #   Env as Env$1 — renamed to avoid collision with @zeltjs/core Env class
          UNEXPECTED=$(echo "$HONO_REFS" \
            | grep -v "^import { HTTPException } from ['\"]hono/http-exception['\"];$" \
            | grep -v "^import { TypedResponse } from ['\"]hono['\"];$" \
            | grep -v "^import { Context, Env, Input, MiddlewareHandler, TypedResponse } from ['\"]hono['\"];$" \
            | grep -v "^import { Context, Env as Env\\\$1, Input, MiddlewareHandler, TypedResponse } from ['\"]hono['\"];$" \
            | grep -v "^import { ContentfulStatusCode } from ['\"]hono/utils/http-status['\"];$" \
            || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::hono leaked into $PUBLIC_DTS"
            echo "$UNEXPECTED"
            exit 1
          fi
          if grep -E "import\(['\"]hono(/|['\"])" "$PUBLIC_DTS"; then
            echo "::error::hono dynamic import leaked into $PUBLIC_DTS"
            exit 1
          fi
          if grep -E "import \{[^}]*\bContainer\b[^}]*\} from ['\"]@needle-di/core['\"]" "$PUBLIC_DTS"; then
            echo "::error::@needle-di/core.Container leaked into $PUBLIC_DTS"
            exit 1
          fi
          echo "OK: no hono / Container leak in $PUBLIC_DTS"

      - name: verify leak check detects real leaks (positive control)
        run: |
          set -e
          PROBE="packages/core/dist/__leak_probe.d.ts"
          echo 'export * from "hono";' > "$PROBE"
          if grep -E "from ['\"]hono(/|['\"])" "$PROBE"; then
            rm "$PROBE"
            echo "OK: leak detection working"
          else
            rm "$PROBE"
            echo "::error::leak detection regression (probe not detected)"
            exit 1
          fi

      - name: Test
        run: pnpm test

      - name: Knip
        run: pnpm knip

      - name: Knip (production)
        run: pnpm knip --production

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Uncommitted changes detected:"
            git status
            git diff
            exit 1
          fi
