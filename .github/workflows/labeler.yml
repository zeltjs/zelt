name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: false

      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const labels = [];

            if (title.startsWith('feat')) labels.push('feature');
            if (title.startsWith('fix')) labels.push('fix');
            if (title.startsWith('docs')) labels.push('documentation');
            if (title.startsWith('chore') || title.startsWith('refactor')) labels.push('chore');
            if (title.includes('!:') || title.includes('breaking')) labels.push('breaking');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels
              });
            }
