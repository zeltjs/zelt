packages:
  - 'packages/*'
  - 'examples/*'
  - 'website'

# 共通依存のバージョンを一元管理し、パッケージ間でのバージョン不一致を防ぐ
# (異なる版が解決されると hono/valibot の instanceof チェックが runtime で失敗するため)
catalog:
  hono: 4.12.16
  valibot: 1.3.1
  "@valibot/to-json-schema": 1.6.0
  "@types/node": 22.19.17
  typescript: 6.0.2
  vitest: 4.1.5
  tsdown: 0.21.10
  tsx: 4.21.0

catalogs:
  # peerDependencies 用: consumer 側の柔軟性を保つため範囲指定を維持する
  peer:
    hono: ^4.0.0
    valibot: ^1.0.0
    "@valibot/to-json-schema": ^1.0.0
    typescript: ">=5.0.0"

ignoredBuiltDependencies:
  - unrs-resolver

onlyBuiltDependencies:
  - "@9wick/eslint-plugin-strict-type-rules"
  - better-sqlite3
  - esbuild
  - nx
