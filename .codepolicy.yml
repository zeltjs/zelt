filter: all
agent: github-copilot/gpt-4.1
concurrency: 10

rules:
  code-duplication: error
  function-contract: error
  strict-function-boundary: error
  no-implicit-fallback: error
  no-invalid-state-type: error
  test-validity: off

overrides:
  - files: ["examples/**"]
    rules:
      code-duplication: off
      strict-function-boundary: off
      no-invalid-state-type: off

  - files: ["**/*.test.ts", "**/*.test.tsx", "**/*.spec.ts", "**/*.spec.tsx"]
    rules:
      code-duplication: off
      function-contract: off
      no-implicit-fallback: off
      no-invalid-state-type: off
      strict-function-boundary: off
      test-validity: error

ignore:
  - website/**
  - node_modules/**
  - .nx/**
  - dist/**
  - out/**
  - coverage/**
  - "**/*.config.*"
  - "**/*.d.ts"
